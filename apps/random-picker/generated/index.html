<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Picker</title>
    <style>
      /* apps/random-picker/src/style.css */
      :root {
        --bg-gradient-start: #141e30;
        --bg-gradient-end: #243b55;
        --card-bg: rgba(255, 255, 255, 0.05);
        --card-border: rgba(255, 255, 255, 0.1);
        --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.7);
        --text-placeholder: rgba(255, 255, 255, 0.4);
        --accent-glow: rgba(0, 212, 255, 0.6);
        --btn-bg: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        --btn-hover: linear-gradient(135deg, #3a7bd5 0%, #00d2ff 100%);
        --output-bg: rgba(0, 0, 0, 0.2);
        --output-glow:
          0 0 20px rgba(0, 212, 255, 0.8), 0 0 40px rgba(0, 212, 255, 0.4);
        --font-family: system-ui, -apple-system, sans-serif;
        --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        outline: none;
      }
      body {
        font-family: var(--font-family);
        background: linear-gradient(
          135deg,
          var(--bg-gradient-start),
          var(--bg-gradient-end)
        );
        background-attachment: fixed;
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow-x: hidden;
        position: relative;
      }
      .glass-container {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        box-shadow: var(--card-shadow);
        width: 100%;
        max-width: 600px;
        padding: 40px;
        z-index: 1;
        display: flex;
        flex-direction: column;
        gap: 24px;
        position: relative;
        overflow: hidden;
        animation: fadeIn 0.3s ease-out;
      }
      .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .input-header,
      .output-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .input-label,
      .output-label {
        color: var(--text-secondary);
        font-size: 0.95rem;
        font-weight: 700;
      }
      .icon-buttons {
        display: flex;
        gap: 8px;
      }
      .icon-button {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: none;
      }
      .icon-button:hover {
        background: rgba(255, 255, 255, 0.16);
      }
      .icon-button svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      #input,
      #output {
        width: 100%;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 16px;
        font-family: var(--font-family);
        font-size: 1rem;
        line-height: 1.6;
        transition: var(--transition-smooth);
      }
      #input,
      #output {
        height: 180px;
        color: var(--text-primary);
        resize: vertical;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
      }
      #input::-webkit-scrollbar,
      #output::-webkit-scrollbar {
        width: 8px;
      }
      #input::-webkit-scrollbar-track,
      #output::-webkit-scrollbar-track {
        background: transparent;
      }
      #input::-webkit-scrollbar-thumb,
      #output::-webkit-scrollbar-thumb {
        background-color: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
      }
      #input:focus,
      #output:focus {
        border-color: rgba(0, 212, 255, 0.5);
        background: rgba(0, 0, 0, 0.3);
        box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
      }
      button {
        background: var(--btn-bg);
        color: white;
        border: none;
        border-radius: 16px;
        padding: 18px 32px;
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(0, 212, 255, 0.3);
        background: var(--btn-hover);
      }
      button:active {
        transform: translateY(1px);
        box-shadow: 0 2px 10px rgba(0, 212, 255, 0.3);
      }
      button:disabled {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.3);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .pipeline-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--card-border);
        border-radius: 20px;
      }
      .pipeline-label {
        color: var(--text-secondary);
        font-size: 0.95rem;
        font-weight: 700;
      }
      .pipeline-step-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 40px;
      }
      .pipeline-step-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        cursor: grab;
        transition: var(--transition-smooth);
      }
      .pipeline-step-item.dragging {
        opacity: 0.5;
        background: rgba(255, 255, 255, 0.04);
      }
      .pipeline-step-item:active {
        cursor: grabbing;
      }
      .pipeline-drag-handle {
        color: var(--text-placeholder);
        cursor: grab;
        display: flex;
        align-items: center;
      }
      .pipeline-step-name {
        flex: 1;
        font-weight: 600;
        font-size: 0.9rem;
      }
      .pipeline-step-params {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .pipeline-step-params input {
        width: 60px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        padding: 4px 8px;
        color: var(--text-primary);
        font-size: 0.85rem;
      }
      .pipeline-delete-btn {
        background: transparent;
        color: var(--text-placeholder);
        border: none;
        padding: 4px;
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        transition: var(--transition-smooth);
        box-shadow: none;
        font-size: 0;
      }
      .pipeline-delete-btn:hover {
        background: rgba(255, 59, 48, 0.1);
        color: #ff3b30;
        box-shadow: none;
      }
      .pipeline-add-controls {
        display: flex;
        gap: 8px;
      }
      .pipeline-add-controls select {
        flex: 1;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 8px 12px;
        color: var(--text-primary);
        font-family: var(--font-family);
        cursor: pointer;
      }
      .pipeline-add-controls button {
        padding: 8px 20px;
        font-size: 0.9rem;
        border-radius: 12px;
      }
      .pipeline-run-btn {
        width: 100%;
        margin-top: 8px;
      }
      .pipeline-empty-msg {
        text-align: center;
        padding: 20px;
        color: var(--text-placeholder);
        font-size: 0.9rem;
        border: 1px dashed rgba(255, 255, 255, 0.1);
        border-radius: 12px;
      }
      .output-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      @media (max-width: 600px) {
        .glass-container {
          padding: 24px;
          border-radius: 20px;
        }
        .input-header,
        .output-header {
          align-items: flex-start;
          flex-direction: column;
        }
        .icon-buttons {
          align-self: flex-end;
        }
        button {
          padding: 16px 24px;
          font-size: 1.1rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="glass-container">
      <div class="input-group">
        <div class="input-header">
          <p class="input-label">入力欄</p>
          <div class="icon-buttons">
            <button
              id="inputCopyBtn"
              class="icon-button"
              type="button"
              aria-label="入力欄をコピー"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="9" y="9" width="10" height="10" rx="2"></rect>
                <path
                  d="M15 9V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"
                ></path>
              </svg>
            </button>
            <button
              id="inputOpenBtn"
              class="icon-button"
              type="button"
              aria-label="入力欄のリンクを新しいタブで開く"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14 5h5v5"></path>
                <path d="M10 14 19 5"></path>
                <path
                  d="M19 13v4a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4"
                ></path>
              </svg>
            </button>
          </div>
        </div>
        <textarea id="input"></textarea>
      </div>

      <div class="pipeline-section">
        <p class="pipeline-label">パイプライン</p>
        <div id="pipelineStepList" class="pipeline-step-list">
          <!-- JSで動的に生成 -->
        </div>
        <div class="pipeline-add-controls">
          <select id="processorSelect">
            <!-- JSで PROCESSOR_REGISTRY からオプションを自動生成 -->
          </select>
          <button id="addStepBtn" type="button">追加</button>
        </div>
        <button id="pipelineRunBtn" class="pipeline-run-btn" type="button">
          実行
        </button>
      </div>

      <div class="output-group">
        <div class="output-header">
          <p class="output-label">出力欄</p>
          <div class="icon-buttons">
            <button
              id="outputCopyBtn"
              class="icon-button"
              type="button"
              aria-label="出力欄をコピー"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="9" y="9" width="10" height="10" rx="2"></rect>
                <path
                  d="M15 9V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"
                ></path>
              </svg>
            </button>
            <button
              id="outputOpenBtn"
              class="icon-button"
              type="button"
              aria-label="出力欄のリンクを新しいタブで開く"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14 5h5v5"></path>
                <path d="M10 14 19 5"></path>
                <path
                  d="M19 13v4a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4"
                ></path>
              </svg>
            </button>
          </div>
        </div>
        <textarea id="output" readonly></textarea>
      </div>
    </div>
